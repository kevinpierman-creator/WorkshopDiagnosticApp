name: Android APK Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Lint, Test & Build APKs
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # 3️⃣ Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 4️⃣ Grant Gradle permissions
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # 5️⃣ Run lint
      - name: Run lint
        run: ./gradlew lint

      # 6️⃣ Run unit tests
      - name: Run unit tests
        run: ./gradlew test

      # 7️⃣ Upload test results
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: app/build/reports/tests/

      # 8️⃣ Build Debug APK
      - name: Build Debug APK
        run: ./gradlew clean assembleDebug --stacktrace

      # 9️⃣ Upload Debug APK
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: WorkshopDiagnosticApp-debug.apk
          path: app/build/outputs/apk/debug/*.apk

      # 🔟 Build Release APK
      - name: Build Release APK
        run: ./gradlew assembleRelease

      # 1️⃣1️⃣ Upload Release APK
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: WorkshopDiagnosticApp-release.apk
          path: app/build/outputs/apk/release/*.apk